<!DOCTYPE html>
<html lang="en">

<!-- ========================================================= -->
<!-- HEAD SECTION -->
<!-- Contains metadata, fonts, Bootstrap framework, icons,
     and custom stylesheet for UI styling. -->
<!-- ========================================================= -->

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Dashboard | Authentication System</title>

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">

    <!-- Bootstrap CSS Framework -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">

    <!-- Custom Styles -->
    <link rel="stylesheet" href="styles.css">

</head>


<body>

<!-- ========================================================= -->
<!-- NAVIGATION BAR -->
<!-- Displays application title and logout option. -->
<!-- ========================================================= -->

<nav class="navbar navbar-expand-lg navbar-dark navbar-custom">

    <div class="container">

        <!-- Application Branding -->
        <a class="navbar-brand" href="#">
            <i class="bi bi-shield-lock"></i>
            Auth System
        </a>

        <!-- Logout Button -->
        <a href="index.html" class="btn btn-danger btn-sm">
            <i class="bi bi-box-arrow-right"></i>
            Logout
        </a>

    </div>

</nav>


<!-- ========================================================= -->
<!-- MAIN DASHBOARD SECTION -->
<!-- Contains statistical cards and main welcome card. -->
<!-- ========================================================= -->

<main class="container py-5">

    <!-- ============================================= -->
    <!-- DASHBOARD STATISTICS CARDS -->
    <!-- Quick information panels for the user. -->
    <!-- ============================================= -->

    <div class="row g-4 mb-5">

        <!-- Profile Card -->
        <div class="col-md-4">

            <div class="stat-card stat-blue text-center">

                <i class="bi bi-person fs-1"></i>

                <h5 class="mt-3">Profile</h5>

                <p class="mb-0">
                    Manage your user profile
                </p>

            </div>

        </div>


        <!-- Security Card -->
        <div class="col-md-4">

            <div class="stat-card stat-purple text-center">

                <i class="bi bi-shield-check fs-1"></i>

                <h5 class="mt-3">Security</h5>

                <p class="mb-0">
                    Password protection enabled
                </p>

            </div>

        </div>


        <!-- Activity Card -->
        <div class="col-md-4">

            <div class="stat-card stat-dark text-center">

                <i class="bi bi-clock-history fs-1"></i>

                <h5 class="mt-3">Activity</h5>

                <p class="mb-0">
                    View recent login activity
                </p>

            </div>

        </div>

    </div>


    <!-- ============================================= -->
    <!-- MAIN DASHBOARD CARD -->
    <!-- Displays welcome message and main actions. -->
    <!-- ============================================= -->

    <div class="row justify-content-center">

        <div class="col-lg-6">

            <div class="card dashboard-card p-4">

                <div class="card-body text-center">

                    <!-- Welcome Heading -->
                    <h3 class="mb-3">
                        Welcome to the Dashboard
                    </h3>

                    <!-- Informational Text -->
                    <p class="text-muted mb-4">
                        You have successfully logged into the authentication system.
                    </p>


                    <!-- Dashboard Action Buttons -->
                    <div class="d-grid gap-3">

                        <button class="btn btn-primary btn-custom">

                            <i class="bi bi-person"></i>
                            View Profile

                        </button>

                        <button class="btn btn-secondary btn-custom">

                            <i class="bi bi-gear"></i>
                            Account Settings

                        </button>

                    </div>

                </div>

            </div>

        </div>

    </div>

</main>


<!-- ========================================================= -->
<!-- BOOTSTRAP JAVASCRIPT -->
<!-- Enables Bootstrap components such as navbar behavior. -->
<!-- ========================================================= -->

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>

</html>
