<!DOCTYPE html>
<html lang="en">

<!-- ========================================================= -->
<!-- DOCUMENT HEAD -->
<!-- Contains metadata, Bootstrap CDN, Icons, Fonts, CSS -->
<!-- ========================================================= -->
<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Login | Authentication System</title>

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">

    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">

    <!-- Custom Styles -->
    <link rel="stylesheet" href="styles.css">

</head>

<body>

<!-- ========================================================= -->
<!-- MAIN LOGIN SECTION -->
<!-- Centered login card using Bootstrap flex utilities -->
<!-- ========================================================= -->

<main class="d-flex align-items-center justify-content-center flex-grow-1">

    <div class="card auth-card">

        <div class="card-body p-4">

            <!-- Page Title -->
            <h3 class="text-center mb-4">Login</h3>

            <!-- ========================================================= -->
            <!-- LOGIN FORM -->
            <!-- Redirects to dashboard.html after submit -->
            <!-- ========================================================= -->

            <form action="dashboard.html">

                <!-- Email Field -->
                <div class="mb-3">
                    <label class="form-label">Email Address</label>
                    <input type="email" class="form-control" placeholder="Enter your email" required>
                </div>

                <!-- Password Field -->
                <div class="mb-3">
                    <label class="form-label">Password</label>

                    <div class="input-group">
                        <input type="password" class="form-control" placeholder="Enter your password" required>
                        <span class="input-group-text">
                            <i class="bi bi-lock"></i>
                        </span>
                    </div>

                </div>

                <!-- Login Button -->
                <div class="d-grid mb-3">
                    <button type="submit" class="btn btn-primary btn-custom">
                        Login
                    </button>
                </div>

            </form>

            <!-- ========================================================= -->
            <!-- NAVIGATION LINKS -->
            <!-- Links to register and forgot password pages -->
            <!-- ========================================================= -->

            <div class="text-center auth-links">

                <p>
                    <a href="forgot-password.html">Forgot Password?</a>
                </p>

                <p>
                    Don't have an account?
                    <a href="register.html">Register</a>
                </p>

            </div>

        </div>

    </div>

</main>

<!-- ========================================================= -->
<!-- BOOTSTRAP JAVASCRIPT -->
<!-- Enables interactive Bootstrap components -->
<!-- ========================================================= -->

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>

</html>
