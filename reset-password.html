<!DOCTYPE html>
<html lang="en">

<!-- ========================================================= -->
<!-- DOCUMENT HEAD -->
<!-- Contains metadata, Bootstrap CDN, icons, fonts, and CSS -->
<!-- ========================================================= -->
<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Reset Password | Authentication System</title>

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">

    <!-- Custom CSS -->
    <link rel="stylesheet" href="styles.css">

</head>

<body>

<!-- ========================================================= -->
<!-- MAIN RESET PASSWORD SECTION -->
<!-- Displays a centered card with password update form -->
<!-- ========================================================= -->

<main class="d-flex align-items-center justify-content-center flex-grow-1">

    <div class="card auth-card">

        <div class="card-body p-4">

            <!-- Page Title -->
            <h3 class="text-center mb-3">Reset Password</h3>

            <p class="text-center text-muted mb-4">
                Enter your new password below.
            </p>

            <!-- ========================================================= -->
            <!-- RESET PASSWORD FORM -->
            <!-- After resetting password user returns to login page -->
            <!-- ========================================================= -->

            <form action="index.html">

                <!-- New Password -->
                <div class="mb-3">
                    <label class="form-label">New Password</label>

                    <div class="input-group">
                        <input type="password"
                               class="form-control"
                               placeholder="Enter new password"
                               required>

                        <span class="input-group-text">
                            <i class="bi bi-lock"></i>
                        </span>
                    </div>
                </div>

                <!-- Confirm Password -->
                <div class="mb-3">
                    <label class="form-label">Confirm Password</label>

                    <div class="input-group">
                        <input type="password"
                               class="form-control"
                               placeholder="Confirm new password"
                               required>

                        <span class="input-group-text">
                            <i class="bi bi-shield-lock"></i>
                        </span>
                    </div>
                </div>

                <!-- Update Password Button -->
                <div class="d-grid mb-3">
                    <button type="submit" class="btn btn-primary btn-custom">
                        Update Password
                    </button>
                </div>

            </form>

            <!-- ========================================================= -->
            <!-- NAVIGATION LINKS -->
            <!-- Allows user to return to login page -->
            <!-- ========================================================= -->

            <div class="text-center auth-links">

                <p>
                    Remember your password?
                    <a href="index.html">Login</a>
                </p>

            </div>

        </div>

    </div>

</main>

<!-- ========================================================= -->
<!-- BOOTSTRAP JAVASCRIPT -->
<!-- Enables Bootstrap interactive components -->
<!-- ========================================================= -->

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>

</html>
