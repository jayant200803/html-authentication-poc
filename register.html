<!DOCTYPE html>
<html lang="en">
<head>

    <!-- Basic Page Metadata -->
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register | Authentication System</title>

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">

    <!-- Bootstrap Framework -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">

    <!-- Custom Styles -->
    <link rel="stylesheet" href="styles.css">

</head>

<body>

<!-- ============================= -->
<!-- Registration Form Section -->
<!-- ============================= -->

<main class="d-flex align-items-center justify-content-center flex-grow-1">

    <div class="card auth-card">
        <div class="card-body p-4">

            <h3 class="text-center mb-4">Create Account</h3>

            <form action="index.html">

                <div class="mb-3">
                    <label class="form-label">Full Name</label>
                    <input type="text" class="form-control" placeholder="Enter your full name" required>
                </div>

                <div class="mb-3">
                    <label class="form-label">Email Address</label>
                    <input type="email" class="form-control" placeholder="Enter your email" required>
                </div>

                <div class="mb-3">
                    <label class="form-label">Password</label>
                    <input type="password" class="form-control" placeholder="Create password" required>
                </div>

                <div class="mb-4">
                    <label class="form-label">Confirm Password</label>
                    <input type="password" class="form-control" placeholder="Confirm password" required>
                </div>

                <div class="d-grid">
                    <button class="btn btn-success btn-custom">
                        <i class="bi bi-person-plus"></i> Register
                    </button>
                </div>

            </form>

            <div class="text-center mt-3 auth-links">
                Already have an account?
                <a href="index.html">Login</a>
            </div>

        </div>
    </div>

</main>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
