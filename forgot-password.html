<!DOCTYPE html>
<html lang="en">

<!-- ========================================================= -->
<!-- DOCUMENT HEAD -->
<!-- Includes metadata, Bootstrap CDN, icons, fonts, and CSS -->
<!-- ========================================================= -->
<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Forgot Password | Authentication System</title>

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">

    <!-- Custom CSS -->
    <link rel="stylesheet" href="styles.css">

</head>

<body>

<!-- ========================================================= -->
<!-- MAIN FORGOT PASSWORD SECTION -->
<!-- Displays a centered card for email input -->
<!-- ========================================================= -->

<main class="d-flex align-items-center justify-content-center flex-grow-1">

    <div class="card auth-card">

        <div class="card-body p-4">

            <!-- Page Title -->
            <h3 class="text-center mb-3">Forgot Password</h3>

            <p class="text-center text-muted mb-4">
                Enter your registered email to reset your password.
            </p>

            <!-- ========================================================= -->
            <!-- FORGOT PASSWORD FORM -->
            <!-- Redirects user to reset-password page -->
            <!-- ========================================================= -->

            <form action="reset-password.html">

                <!-- Email Input -->
                <div class="mb-3">
                    <label class="form-label">Email Address</label>
                    <input type="email"
                           class="form-control"
                           placeholder="Enter your registered email"
                           required>
                </div>

                <!-- Send Reset Link Button -->
                <div class="d-grid mb-3">
                    <button type="submit" class="btn btn-warning btn-custom">
                        Send Reset Link
                    </button>
                </div>

            </form>

            <!-- ========================================================= -->
            <!-- NAVIGATION LINKS -->
            <!-- Allows user to go back to login -->
            <!-- ========================================================= -->

            <div class="text-center auth-links">

                <p>
                    Remember your password?
                    <a href="index.html">Login</a>
                </p>

            </div>

        </div>

    </div>

</main>

<!-- ========================================================= -->
<!-- BOOTSTRAP JAVASCRIPT -->
<!-- Enables interactive Bootstrap components -->
<!-- ========================================================= -->

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>

</html>
